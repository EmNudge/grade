$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Discover all apps and packages automatically.
projects:
  - 'apps/*'
  - 'packages/*'

# Be explicit about the default branch so VCS/affected detection (and CI, which
# checks out with fetch-depth: 0) resolves it deterministically.
vcs:
  client: 'git'
  defaultBranch: 'main'
