$schema: 'https://moonrepo.dev/schemas/toolchains.json'

# javascript must be enabled alongside the node/pnpm toolchain
javascript: {}

node:
  version: '24.14.1'
  packageManager: 'pnpm'
  pnpm:
    version: '10.33.0'
  # Auto-install deps when lockfile/manifest changes
  syncProjectWorkspaceDependencies: true
