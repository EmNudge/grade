$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

tasks:
  dev:
    command: 'pnpm run dev'
    options:
      runInCI: false # dev server — skipped in CI, never cached

  build:
    command: 'pnpm run build'
    inputs:
      - 'src/**/*'
      - 'public/**/*'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'package.json'
    outputs:
      - 'dist'

  test:
    command: 'pnpm run test'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  deploy:
    command: 'pnpm run deploy'
    deps:
      - '~:build'
